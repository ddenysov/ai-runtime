version = 0.1

[default.global.parameters]
stack_name = "ai-runtime-webhooks"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
resolve_s3 = true
region = "eu-central-1"
parameter_overrides = "EnvironmentName=\"prod\" QueueName=\"ai-runtime-telegram-webhooks\" WafRateLimit=\"1000\" EnableManagedWafRules=\"false\" CreateHomeConsumerUser=\"true\" ApiDeploymentRevision=\"3\""
s3_prefix = "ai-runtime-webhooks"
disable_rollback = true
image_repositories = []

[prod.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
resolve_s3 = true
region = "eu-central-1"
parameter_overrides = "EnvironmentName=prod QueueName=ai-runtime-telegram-webhooks WafRateLimit=1000 EnableManagedWafRules=false CreateHomeConsumerUser=true ApiDeploymentRevision=3"
