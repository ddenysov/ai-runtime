services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    environment:
      UV_CACHE_DIR: /tmp/uv-cache
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
      - uv_cache:/tmp/uv-cache
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    restart: unless-stopped
    command: php artisan queue:listen --sleep=3 --tries=3 --timeout=90
    environment:
      UV_CACHE_DIR: /tmp/uv-cache
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
      - uv_cache:/tmp/uv-cache
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      UV_CACHE_DIR: /tmp/uv-cache
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
      - uv_cache:/tmp/uv-cache
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:latest
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:latest
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-laravel}"
      POSTGRES_USER: "${DB_USERNAME:-laravel}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-laravel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgweb:
    image: sosedoff/pgweb:latest
    ports:
      - "${PGWEB_PORT:-3030}:8081"
    command:
      - "--bind=0.0.0.0"
      - "--listen=8081"
      - "--url=postgres://${DB_USERNAME:-laravel}:${DB_PASSWORD:-secret}@postgres:5432/${DB_DATABASE:-laravel}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@example.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-secret}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_DESKTOP_USER: "'${PGADMIN_DEFAULT_EMAIL:-admin@example.com}'"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  node_modules:
  uv_cache:
